name: Build MCNovaServerLauncher

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Java
      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      # Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      ####################################################
      # Build Spring Boot
      ####################################################

      - name: Grant execute permission (macOS/Linux)
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build Backend (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :backend:bootJar

      - name: Build Backend (macOS/Linux)
        if: runner.os != 'Windows'
        run: ./gradlew :backend:bootJar

      ####################################################
      # Frontend
      ####################################################

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      ####################################################
      # Copy SpringBoot Jar
      ####################################################

      - name: Copy Backend Jar (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force frontend/backend
          Copy-Item backend/build/libs/*.jar frontend/backend/backend.jar

      - name: Copy Backend Jar (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir -p frontend/backend
          cp backend/build/libs/*.jar frontend/backend/backend.jar

      ####################################################
      # Electron
      ####################################################

      - name: Build Electron Package
        working-directory: frontend
        run: npm run dist

      ####################################################
      # Upload
      ####################################################

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MCNova-${{ runner.os }}
          path: |
            frontend/release/**
